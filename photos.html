<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="האלבום המשפחתי של הטיול לדרום צרפת — כולם מעלים, כולם רואים">
<title>האלבום שלנו · דרום צרפת</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#F4F1EC; --surface:#FFFDF9; --ink:#211E1A; --muted:#6B6155;
  --line:#E4DDD1; --line-soft:#EFE9DF;
  --gold:#BE7B22; --brown:#8A5A33; --sea:#1E7A93;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Assistant",system-ui,sans-serif;
  --serif:"Frank Ruhl Libre",serif; --lat:"Fraunces",serif; --hand:"Caveat",cursive;
  --r:14px; --shadow:0 10px 30px -18px rgba(50,35,18,.55);
  --maxw:1240px; --ease:cubic-bezier(.22,.8,.22,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;overflow-x:hidden}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(20px,5vw,64px)}

/* ---------- masthead ---------- */
header.top{padding:clamp(38px,6vw,80px) 0 26px;
  background:radial-gradient(115% 130% at 88% -10%, color-mix(in srgb,var(--gold) 13%,transparent), transparent 55%)}
.eyebrow{font-size:13px;font-weight:600;letter-spacing:.13em;color:var(--gold)}
.mast{display:flex;align-items:flex-end;justify-content:space-between;gap:28px;flex-wrap:wrap;margin-top:16px}
h1{font-family:var(--serif);font-weight:900;font-size:clamp(38px,6.6vw,74px);line-height:.98;letter-spacing:-.01em}
h1 .fr{display:block;font-family:var(--lat);font-style:italic;font-weight:400;font-size:.32em;color:var(--muted);margin-top:13px}
.newbadge{display:none;font-family:var(--font);font-size:13px;font-weight:700;color:#fff;background:var(--sea);
  border-radius:999px;padding:5px 14px;margin-top:14px;width:fit-content}
.newbadge.show{display:inline-block;animation:pop .45s var(--ease)}
.contrib{display:flex;align-items:center;padding-bottom:6px}
.contrib .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:#fff;border:2.5px solid var(--bg);margin-inline-start:-12px;box-shadow:0 2px 8px rgba(60,40,20,.15)}
.contrib .av:first-child{margin-inline-start:0}
.contrib .lbl{margin-inline-start:14px;font-size:13px;color:var(--muted);line-height:1.35}
.contrib .lbl b{color:var(--ink);font-weight:700}

/* ---------- toolbar (sticky) ---------- */
nav.bar{position:sticky;top:0;z-index:30;margin-top:26px;
  background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.bar .wrap{display:flex;align-items:center;gap:22px;padding:13px 0;flex-wrap:wrap}
.seg{display:flex;gap:24px}
.seg button{background:none;border:0;font-family:inherit;font-size:15.5px;font-weight:700;color:var(--muted);
  cursor:pointer;padding:4px 0;position:relative;transition:color .18s}
.seg button[aria-selected="true"]{color:var(--ink)}
.seg button[aria-selected="true"]::after{content:"";position:absolute;inset:auto 0 -14px 0;height:2.5px;background:var(--gold);border-radius:2px}
.seg .cnt{font-size:12px;font-weight:600;color:var(--muted);margin-inline-start:5px}
.spacer{margin-inline-start:auto}
/* display-style switch */
.styleswitch{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px}
.styleswitch button{border:0;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;padding:6px 12px;border-radius:7px;display:inline-flex;align-items:center;gap:6px;transition:.18s var(--ease)}
.styleswitch button[aria-pressed="true"]{background:color-mix(in srgb,var(--gold) 14%,var(--surface));color:var(--brown)}
.styleswitch svg{width:15px;height:15px}
.tbtn{border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:8px 15px;font-family:inherit;
  font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;display:inline-flex;gap:7px;align-items:center;transition:.18s var(--ease)}
.tbtn:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--gold) 40%,var(--line))}
.tbtn.pri{background:var(--brown);color:#fff;border-color:var(--brown)}
.tbtn.pri:hover{filter:brightness(1.05)}
.idchip{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:5px 13px 5px 6px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink);transition:.18s var(--ease)}
.idchip:hover{border-color:color-mix(in srgb,var(--gold) 40%,var(--line))}
.idchip img,.idchip .avfall{width:26px;height:26px;border-radius:50%;object-fit:cover;flex:none}
.backlink{font-size:14px;font-weight:700;color:var(--brown);text-decoration:none;transition:opacity .18s}
.backlink:hover{opacity:.65}
.avfall{display:inline-flex;align-items:center;justify-content:center;background:var(--gold);color:#fff;font-weight:800}

/* ---------- gallery ---------- */
main{padding:34px 0 110px}
.person{margin:0 0 40px}
.person-h{display:flex;align-items:center;gap:12px;padding-bottom:12px;margin-bottom:20px;border-bottom:1px solid var(--line)}
.person-h img,.person-h .avfall{width:40px;height:40px;border-radius:50%;object-fit:cover;font-size:17px}
.person-h h3{font-family:var(--serif);font-size:24px;font-weight:700;letter-spacing:-.01em}
.person-h .pc{font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:3px 12px}

/* masonry — real aspect ratios */
.masonry{display:flex;align-items:flex-start;gap:22px}
.mcol{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:22px}
@media(max-width:900px){.masonry,.mcol{gap:14px}}
@media(max-width:520px){.masonry,.mcol{gap:10px}}
.masonry figure{position:relative;cursor:pointer;-webkit-user-select:none;user-select:none;margin:0}
.frame>img{aspect-ratio:var(--ar,3/2);width:100%;height:auto;display:block}

/* -- compact grid (dense square thumbnails, scan many at a glance) -- */
.gridwrap{display:grid;gap:4px;grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
@media(max-width:640px){.gridwrap{grid-template-columns:repeat(3,1fr);gap:3px}}
.gridwrap figure{position:relative;cursor:pointer;-webkit-user-select:none;user-select:none;margin:0}
.style-grid .frame{aspect-ratio:1;border-radius:3px;overflow:hidden;box-shadow:none}
.style-grid .frame>img{aspect-ratio:1;width:100%;height:100%;object-fit:cover}
.style-grid figure:hover .frame>img{transform:scale(1.06);transition:transform .4s var(--ease)}
.style-grid .hovname,.style-grid .tape{display:none}
.style-grid .pick{width:22px;height:22px;top:6px;inset-inline-end:6px}
.style-grid .newdot{top:6px;inset-inline-start:6px;width:10px;height:10px}

/* frame + hover attribution (name shows on hover, not always) */
.frame{position:relative;overflow:hidden}
.frame img{display:block;width:100%}
/* hover zoom happens INSIDE the frame so the hover target never moves (no jitter) */
.frame>img{transition:transform .5s var(--ease)}
figure:hover .frame>img{transform:scale(1.045)}
.hovname{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;gap:8px;padding:22px 12px 10px;
  background:linear-gradient(to top,rgba(20,14,8,.74),transparent);color:#fff;font-size:13px;font-weight:700;
  opacity:0;transform:translateY(4px);transition:.2s var(--ease);pointer-events:none}
figure:hover .hovname{opacity:1;transform:none}
.hovname .av-img,.hovname .avfall{width:22px;height:22px;border-radius:50%;font-size:11px;flex:none}
.hovname>span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(hover:none){.hovname{display:none}} /* touch: attribution via lightbox / person view */

/* -- journal style -- */
.style-journal .frame{border-radius:8px;box-shadow:var(--shadow);transition:box-shadow .3s var(--ease)}
.style-journal figure:hover .frame{box-shadow:0 18px 44px -20px rgba(50,35,18,.6)}

/* -- wall style -- (polaroid: white frame, larger bottom lip, slight rotation) */
.style-wall figure{background:var(--surface);padding:12px 12px 30px;border-radius:4px;box-shadow:0 12px 28px -14px rgba(50,35,18,.45);transition:box-shadow .3s var(--ease)}
.style-wall figure:nth-child(3n){transform:rotate(-1.1deg)}
.style-wall figure:nth-child(3n+1){transform:rotate(.9deg)}
.style-wall figure:nth-child(4n){transform:rotate(-.5deg)}
.style-wall figure:hover{box-shadow:0 20px 42px -16px rgba(50,35,18,.55)}
.style-wall .frame{border-radius:2px}
.style-wall .tape{position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(-3deg);width:76px;height:22px;
  background:color-mix(in srgb,var(--gold) 26%,transparent);border:1px dashed color-mix(in srgb,var(--brown) 32%,transparent);border-radius:2px}
.style-journal .tape{display:none}

/* unread divider */
.unread-divider{display:flex;align-items:center;gap:14px;margin:14px 0 24px}
.unread-divider::before,.unread-divider::after{content:"";flex:1;height:1px;background:color-mix(in srgb,var(--sea) 40%,var(--line))}
.unread-divider b{flex:none;font-size:13px;font-weight:700;color:var(--sea);
  background:color-mix(in srgb,var(--sea) 9%,var(--surface));border:1px solid color-mix(in srgb,var(--sea) 28%,var(--line));border-radius:999px;padding:5px 15px}

/* new marker + selection (both styles) */
.newdot{position:absolute;top:12px;inset-inline-start:12px;width:12px;height:12px;border-radius:50%;background:var(--sea);box-shadow:0 0 0 4px var(--surface);z-index:3}
.style-journal .newdot{box-shadow:0 0 0 3px var(--bg)}
.pick{position:absolute;top:10px;inset-inline-end:10px;width:26px;height:26px;border-radius:50%;z-index:4;
  background:rgba(255,255,255,.55);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);display:none;
  align-items:center;justify-content:center;transition:.15s var(--ease)}
.selecting .pick{display:flex}
figure.sel .pick{background:var(--gold);border-color:#fff}
figure.sel .pick::after{content:"✓";color:#fff;font-size:15px;font-weight:800}
.selecting figure.sel img{outline:3px solid var(--gold);outline-offset:-1px}
.selecting figure{cursor:pointer}

/* ---------- states ---------- */
.state{text-align:center;padding:76px 20px;color:var(--muted)}
.state .big{font-size:46px;margin-bottom:12px}
.state h3{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--ink);margin-bottom:8px}
.state p{font-size:14.5px;max-width:420px;margin:0 auto 20px}
.sk{column-count:3;column-gap:22px}
@media(max-width:900px){.sk{column-count:2}}
.sk i{display:block;break-inside:avoid;margin:0 0 22px;border-radius:8px;background:var(--line-soft);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ---------- buttons / FAB ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;font-family:inherit;
  font-weight:700;font-size:15px;color:#fff;background:var(--brown);border-radius:11px;padding:12px 22px;transition:.18s var(--ease);text-decoration:none}
.btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn.sec{color:var(--brown);background:var(--surface);border:1px solid color-mix(in srgb,var(--brown) 40%,var(--line))}
.btn.sec:hover{background:color-mix(in srgb,var(--brown) 7%,var(--surface));filter:none}
.fab{position:fixed;bottom:22px;inset-inline-end:22px;z-index:40;border-radius:999px;padding:15px 24px;font-size:16px;
  background:var(--gold);box-shadow:0 16px 40px -12px color-mix(in srgb,var(--gold) 70%,transparent)}

/* ---------- selection action bar ---------- */
.selbar{position:fixed;bottom:0;left:0;right:0;z-index:45;background:var(--ink);color:#fff;
  transform:translateY(110%);transition:transform .3s var(--ease)}
.selbar.show{transform:none}
.selbar .wrap{display:flex;align-items:center;gap:14px;padding:14px 0}
.selbar .n{font-size:15px;font-weight:700}
.selbar .n b{color:var(--gold)}
.selbar .lnk{background:none;border:0;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;opacity:.8}
.selbar .lnk:hover{opacity:1}
.selbar .dl{margin-inline-start:auto;background:var(--gold);border:0;color:#fff;font-family:inherit;font-size:15px;
  font-weight:700;border-radius:10px;padding:11px 22px;cursor:pointer;display:inline-flex;gap:8px;align-items:center}
.selbar .dl:disabled{opacity:.4;cursor:default}

/* ---------- lightbox ---------- */
.lb{position:fixed;inset:0;z-index:70;display:none;background:rgba(20,15,10,.94);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.lb.open{display:block}
.lb img#lbImg{position:absolute;inset:0;margin:auto;max-width:calc(100% - 24px);max-height:calc(100% - 120px);object-fit:contain;border-radius:5px;animation:fade .25s ease}
.lb .lbbottom{position:absolute;bottom:22px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:16px}
.lb .lbwho{display:flex;align-items:center;gap:9px;color:#fff;font-size:15px;font-weight:700}
.lb .lbwho img,.lb .lbwho .avfall{width:30px;height:30px;border-radius:50%;font-size:14px}
.lb .lbdl{background:rgba(255,255,255,.15);color:#fff;border:0;border-radius:999px;padding:9px 18px;font-family:inherit;
  font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;gap:7px;align-items:center;transition:.15s var(--ease)}
.lb .lbdl:hover{background:rgba(255,255,255,.28)}
.lb .navbtn{position:absolute;z-index:2;border:0;cursor:pointer;background:rgba(255,255,255,.12);color:#fff;border-radius:50%;
  width:46px;height:46px;font-size:20px;line-height:1;backdrop-filter:blur(4px);transition:.15s var(--ease)}
.lb .navbtn:hover{background:rgba(255,255,255,.26)}
.lb .x{top:18px;inset-inline-end:18px}
.lb .nnext{top:50%;left:14px;transform:translateY(-50%)}
.lb .nprev{top:50%;right:14px;transform:translateY(-50%)}
@media(max-width:600px){.lb .nnext,.lb .nprev{display:none}}

/* ---------- identity modal ---------- */
.overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(28,22,16,.5);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:20px}
.overlay.open{display:flex}
.modal{position:relative;background:var(--surface);border-radius:20px;max-width:400px;width:100%;padding:30px 26px;
  box-shadow:0 30px 90px -20px rgba(0,0,0,.5);animation:pop .35s var(--ease);text-align:center}
.modal h3{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:6px}
.modal p{font-size:14px;color:var(--muted);margin-bottom:20px}
.modal .gwrap{display:flex;justify-content:center;margin-bottom:6px;min-height:44px}
.modal .or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12.5px;font-weight:600;margin:16px 0}
.modal .or::before,.modal .or::after{content:"";flex:1;height:1px;background:var(--line)}
.modal input[type=text]{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-family:inherit;
  font-size:15px;color:var(--ink);background:var(--bg);outline:none;transition:border .18s}
.modal input[type=text]:focus{border-color:var(--gold)}
.modal .row{display:flex;gap:10px;margin-top:16px}
.modal .row .btn{flex:1}
.modal .mavatar{width:56px;height:56px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 30%,transparent)}
.modal .close{position:absolute;top:14px;inset-inline-end:14px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:15px;color:var(--muted);line-height:1}

/* ---------- toast / progress ---------- */
.newbanner{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-12px);z-index:44;
  background:var(--sea);color:#fff;font-family:var(--font);font-size:14px;font-weight:700;border:0;cursor:pointer;
  border-radius:999px;padding:9px 20px;box-shadow:0 8px 24px -8px rgba(0,0,0,.4);opacity:0;pointer-events:none;
  transition:.3s var(--ease);white-space:nowrap}
.newbanner.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.newbanner:hover{filter:brightness(1.07)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;background:var(--ink);color:#fff;
  font-size:14px;font-weight:600;border-radius:999px;padding:11px 22px;opacity:0;pointer-events:none;transition:.3s var(--ease);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.prog{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--ink);color:#fff;transform:translateY(110%);transition:transform .3s var(--ease)}
.prog.show{transform:none}
.prog .wrap{padding:16px 0 18px}
.prog .row{display:flex;justify-content:space-between;font-size:14px;font-weight:700;margin-bottom:10px}
.prog .track{height:6px;border-radius:6px;background:rgba(255,255,255,.18);overflow:hidden}
.prog .fill{height:100%;background:var(--gold);width:0;transition:width .2s linear}

footer{border-top:1px solid var(--line);padding:30px 0 44px;color:var(--muted);font-family:var(--lat);font-style:italic;font-size:14px;text-align:center}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:none}}
/* entrance is opacity-only — NO transform on multicol children (avoids the
   Chrome/Safari multi-column repaint bug where tiles flicker/vanish) */
.reveal{opacity:0}
.reveal.in{opacity:1;transition:opacity .5s var(--ease)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.reveal{opacity:1}}
</style>
</head>
<body>

<header class="top">
  <div class="wrap">
    <div class="eyebrow">קיץ 2026 · פרובאנס והריביירה</div>
    <div class="mast">
      <h1>האלבום שלנו<span class="fr">Notre album · un été en France</span>
        <span class="newbadge" id="newBadge"></span></h1>
      <div class="contrib" id="contrib"></div>
    </div>
  </div>
</header>

<nav class="bar">
  <div class="wrap">
    <div class="seg">
      <button data-view="people" aria-selected="true">לפי אנשים<span class="cnt" id="cntPeople"></span></button>
      <button data-view="all" aria-selected="false">הכל ביחד<span class="cnt" id="cntAll"></span></button>
    </div>
    <span class="spacer"></span>
    <div class="styleswitch" role="group" aria-label="סגנון תצוגה">
      <button data-style="grid" aria-pressed="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="10" y="3" width="5" height="5" rx="1"/><rect x="17" y="3" width="4" height="5" rx="1"/><rect x="3" y="10" width="5" height="5" rx="1"/><rect x="10" y="10" width="5" height="5" rx="1"/><rect x="17" y="10" width="4" height="5" rx="1"/><rect x="3" y="17" width="5" height="4" rx="1"/><rect x="10" y="17" width="5" height="4" rx="1"/></svg>רשת</button>
      <button data-style="journal" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="14" x2="21" y2="14"/></svg>יומן</button>
      <button data-style="wall" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>קיר</button>
    </div>
    <button class="tbtn" id="selectBtn">בחירה</button>
    <button class="idchip" id="idChip" style="display:none"></button>
    <a class="backlink" href="index.html">למדריך ›</a>
  </div>
</nav>

<main class="wrap">
  <div id="galleryRoot"></div>
</main>

<button class="btn fab" id="fabUpload">📸 הוסיפו תמונות</button>
<input type="file" id="fileInput" accept="image/*" multiple hidden>

<!-- selection action bar -->
<div class="selbar" id="selBar">
  <div class="wrap">
    <span class="n"><b id="selCount">0</b> נבחרו</span>
    <button class="lnk" id="selAll">בחר הכל</button>
    <button class="lnk" id="selCancel">ביטול</button>

</div>

<!-- identity modal -->
<div class="overlay" id="idOverlay">
  <div class="modal">
    <button class="close" id="idClose" aria-label="סגירה">✕</button>
    <div id="idStep1">
      <h3>רגע, מי מצלם?</h3>
      <p>כדי שכולם ידעו מי העלה כל תמונה — הזדהו פעם אחת בלבד.</p>
      <div class="gwrap" id="gBtn"></div>
      <div class="or">או בלי גוגל</div>
      <input type="text" id="manualName" placeholder="השם שלכם (למשל: סבתא רונה)" maxlength="30">
      <div class="row"><button class="btn" id="manualGo">המשך</button></div>
    </div>
    <div id="idStep2" style="display:none">
      <img class="mavatar" id="confAvatar" alt="" referrerpolicy="no-referrer">

    <div class="lbwho" id="lbWho"></div>
    <button class="lbdl" id="lbDownload">⬇ הורדה</button>

<div class="prog" id="prog">
  <div class="wrap">
    <div class="row"><span id="progLabel">מכין את ההורדה…</span><span id="progPct">0%</span></div>
    <div class="track"><div class="fill" id="progFill"></div></div>
  </div>
</div>

<button class="newbanner" id="newBanner"></button>
<div class="toast" id="toast"></div>

<footer><div class="wrap">Fin de l'album · דרום צרפת 2026 🌻</div></footer>

<script>
'use strict';
/* ================= config ================= */
const CLOUD='zeiwhzn0', PRESET='france-family', TAG='france2026-family';
const GOOGLE_CLIENT_ID='462911274506-3vi920k6h0hshhmd2otl5q8v47llf4b7.apps.googleusercontent.com';
const LS_ID='f26_identity', LS_SEEN='f26_lastSeen', LS_STYLE='f26_style';
const AVATAR_COLORS=['#BE7B22','#8A5A33','#1E7A93','#A6572E','#5E7A3C'];

/* ================= state ================= */
let photos=[], view='people';
let style=localStorage.getItem(LS_STYLE)||'grid';
let lastSeen=localStorage.getItem(LS_SEEN), firstVisit=!lastSeen;
let lbIndex=-1, selectMode=false;
const selected=new Set();
let pendingUpload=false;

const $=id=>document.getElementById(id);
const rootEl=$('galleryRoot');
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const colorFor=name=>{let h=0;for(const ch of String(name))h=(h*31+ch.charCodeAt(0))>>>0;return AVATAR_COLORS[h%AVATAR_COLORS.length]};

/* broken avatar images -> initial-letter circle */
document.addEventListener('error',e=>{
  const t=e.target;
  if(t&&t.tagName==='IMG'&&t.classList.contains('av-img')){
    const s=document.createElement('span');s.className='avfall';s.style.background=t.dataset.color||'var(--gold)';
    s.textContent=t.dataset.ch||'?';t.replaceWith(s);
  }
},true);
function avatarEl(av,name){
  const ch=esc(String(name||'?').trim().charAt(0)||'?'), col=colorFor(name);
  if(av)return `<img class="av-img" src="${esc(av)}" data-ch="${ch}" data-color="${col}" alt="" referrerpolicy="no-referrer">`;
  return `<span class="avfall" style="background:${col}">${ch}</span>`;
}

/* ================= identity ================= */
function getIdentity(){try{return JSON.parse(localStorage.getItem(LS_ID))||null}catch(e){return null}}
function setIdentity(name,avatar){localStorage.setItem(LS_ID,JSON.stringify({name:name.trim(),avatar:avatar||''}));renderChip()}
function renderChip(){
  const id=getIdentity(),chip=$('idChip');
  if(!id){chip.style.display='none';return}
  chip.style.display='inline-flex';
  chip.innerHTML=avatarEl(id.avatar,id.name)+`<span>${esc(id.name)}</span>`;
}
$('idChip').addEventListener('click',()=>openIdentityModal(false));

function openIdentityModal(forUpload){
  pendingUpload=!!forUpload;
  $('idStep1').style.display='';$('idStep2').style.display='none';
  const cur=getIdentity();$('manualName').value=cur?cur.name:'';
  $('idOverlay').classList.add('open');initGoogleBtn();
}
function closeIdentityModal(){$('idOverlay').classList.remove('open')}
$('idClose').addEventListener('click',closeIdentityModal);
$('idOverlay').addEventListener('click',e=>{if(e.target===$('idOverlay'))closeIdentityModal()});

let gisReady=false;
function initGoogleBtn(){
  if(gisReady)return;
  if(!(window.google&&google.accounts&&google.accounts.id)){setTimeout(initGoogleBtn,300);return}
  try{
    google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:onGoogleCred,auto_select:false});
    google.accounts.id.renderButton($('gBtn'),{theme:'outline',size:'large',shape:'pill',text:'continue_with',locale:'he',width:280});
    gisReady=true;
  }catch(e){}
}
function onGoogleCred(resp){
  try{
    const p=JSON.parse(decodeURIComponent(escape(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')))));
    $('idStep1').style.display='none';$('idStep2').style.display='';
    const av=$('confAvatar');
    if(p.picture){av.src=p.picture;av.style.display='block'}else av.style.display='none';
    av.dataset.url=p.picture||'';
    $('confName').value=p.given_name||p.name||'';$('confName').focus();
  }catch(e){showToast('משהו השתבש בהתחברות — נסו שוב או הזינו שם')}
}
$('confGo').addEventListener('click',()=>{
  const n=$('confName').value.trim();if(!n){$('confName').focus();return}
  setIdentity(n,$('confAvatar').dataset.url);closeIdentityModal();if(pendingUpload)triggerPicker();
});
$('manualGo').addEventListener('click',()=>{
  const n=$('manualName').value.trim();if(!n){$('manualName').focus();return}
  setIdentity(n,'');closeIdentityModal();if(pendingUpload)triggerPicker();
});
$('manualName').addEventListener('keydown',e=>{if(e.key==='Enter')$('manualGo').click()});
$('confName').addEventListener('keydown',e=>{if(e.key==='Enter')$('confGo').click()});

/* ================= upload ================= */
/* Native upload: the FAB opens the OS photo picker directly (no third-party
   widget), then we POST each file to Cloudinary's unsigned endpoint with our
   own progress bar. */
$('fabUpload').addEventListener('click',()=>{if(getIdentity())triggerPicker();else openIdentityModal(true)});
function triggerPicker(){$('fileInput').value='';$('fileInput').click()}
$('fileInput').addEventListener('change',e=>{const f=e.target.files;if(f&&f.length)uploadFiles(f)});
const ctxEscape=v=>String(v).replace(/([=|])/g,'\\$1');
function cldUpload(file,id,onProg){
  return new Promise((res,rej)=>{
    const fd=new FormData();
    fd.append('file',file);fd.append('upload_preset',PRESET);fd.append('tags',TAG);
    let ctx='uploader='+ctxEscape(id.name);if(id.avatar)ctx+='|avatar='+ctxEscape(id.avatar);
    fd.append('context',ctx);
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`);
    xhr.upload.onprogress=ev=>{if(ev.lengthComputable&&onProg)onProg(ev.loaded/ev.total*100)};
    xhr.onload=()=>{if(xhr.status>=200&&xhr.status<300){try{res(JSON.parse(xhr.responseText))}catch(e){rej(e)}}else rej(new Error('http'+xhr.status))};
    xhr.onerror=()=>rej(new Error('network'));xhr.ontimeout=()=>rej(new Error('timeout'));
    xhr.timeout=120000;xhr.send(fd);
  });
}
async function uploadFiles(fileList){
  const files=[...fileList].filter(f=>f.type.startsWith('image/'));
  if(!files.length){showToast('לא נבחרו תמונות');return}
  const id=getIdentity();if(!id){openIdentityModal(true);return}
  showProg(files.length===1?'מעלה תמונה…':`מעלה ${files.length} תמונות…`);
  let ok=0,fail=0;const fresh=[];
  for(let i=0;i<files.length;i++){
    try{
      const info=await cldUpload(files[i],id,pct=>setProg(((i+pct/100)/files.length)*100,`מעלה ${i+1} מתוך ${files.length}…`));
      fresh.push({id:info.public_id,ver:info.version,created:info.created_at,w:info.width||3,h:info.height||2,uploader:id.name,avatar:id.avatar||'',isNew:false});
      ok++;
    }catch(e){fail++}
  }
  hideProg();
  if(fresh.length){photos.unshift(...fresh);render()}
  if(ok&&!fail)showToast(ok===1?'התמונה עלתה לאלבום! 🎉':`${ok} תמונות עלו לאלבום! 🎉`);
  else if(ok&&fail)showToast(`${ok} עלו, ${fail} נכשלו — נסו שוב את השאר`);
  else showToast('ההעלאה נכשלה — בדקו חיבור ונסו שוב');
}

/* ================= data ================= */
const thumbUrl=p=>`https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto,w_640/v${p.ver}/${encodeURIComponent(p.id)}`;
const fullUrl=p=>`https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto,w_1800/v${p.ver}/${encodeURIComponent(p.id)}`;
const origUrl=p=>`https://res.cloudinary.com/${CLOUD}/image/upload/fl_attachment/v${p.ver}/${encodeURIComponent(p.id)}`;

const cmpNewestFirst=(a,b)=>b.created<a.created?-1:b.created>a.created?1:0;
/* returns the mapped photo list, [] for an empty album, or null on error */
async function fetchList(){
  let res;
  try{res=await fetch(`https://res.cloudinary.com/${CLOUD}/image/list/${TAG}.json?t=${Date.now()}`,{cache:'no-store'})}
  catch(e){return null}
  if(res.status===404)return [];
  if(!res.ok)return null;
  let data;try{data=await res.json()}catch(e){return null}
  return (data.resources||[]).map(r=>({
    id:r.public_id,ver:r.version,created:r.created_at,
    w:r.width||3,h:r.height||2,
    uploader:(r.context&&r.context.custom&&r.context.custom.uploader)||'אורח/ת',
    avatar:(r.context&&r.context.custom&&r.context.custom.avatar)||'',
    isNew:!firstVisit&&lastSeen&&r.created_at>lastSeen
  })).sort(cmpNewestFirst);
}
async function fetchGallery(){
  renderSkeleton();
  const list=await fetchList();
  if(list===null)return renderError();
  photos=list;render();scheduleMarkSeen();startPolling();
}
/* ---- live updates: poll quietly, surface a "new photos" banner (no scroll jump) ---- */
let pollTimer=null,pollBound=false,pendingNew=[];
function startPolling(){
  if(pollTimer)return;
  pollTimer=setInterval(()=>{if(document.visibilityState==='visible')pollGallery()},40000);
  if(!pollBound){pollBound=true;document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')pollGallery()})}
}
async function pollGallery(){
  const list=await fetchList();
  if(!list)return; /* silent on background errors */
  const known=new Set([...photos.map(p=>p.id),...pendingNew.map(p=>p.id)]);
  const fresh=list.filter(p=>!known.has(p.id));
  if(fresh.length){pendingNew.push(...fresh);showNewBanner()}
}
function showNewBanner(){
  const n=pendingNew.length,b=$('newBanner');
  b.textContent=`✨ ${n===1?'תמונה חדשה':n+' תמונות חדשות'} · הצג`;
  b.classList.add('show');
}
$('newBanner').addEventListener('click',()=>{
  if(!pendingNew.length)return;
  photos=[...pendingNew,...photos].sort(cmpNewestFirst);pendingNew=[];
  $('newBanner').classList.remove('show');
  render();scheduleMarkSeen();
  window.scrollTo({top:0,behavior:'smooth'});
});
let seenTimer=null;
function scheduleMarkSeen(){
  clearTimeout(seenTimer);
  seenTimer=setTimeout(()=>{
    if(photos.length)localStorage.setItem(LS_SEEN,photos[0].created);
    else if(firstVisit)localStorage.setItem(LS_SEEN,new Date(0).toISOString());
  },4000);
}

/* ================= rendering ================= */
function figHtml(p,gi){
  const u=esc(p.uploader), selCls=selected.has(p.id)?' sel':'';
  return `<figure class="reveal${selCls}" data-gi="${gi}">
    <span class="tape"></span>${p.isNew?'<span class="newdot"></span>':''}<span class="pick"></span>
    <div class="frame">
      <img loading="lazy" style="--ar:${p.w}/${p.h}" src="${thumbUrl(p)}" alt="תמונה מהטיול של ${u}">
      <span class="hovname">${avatarEl(p.avatar,p.uploader)}<span>${u}</span></span>
    </div>
  </figure>`;
}
function renderSkeleton(){
  rootEl.className='';
  const hs=[260,190,320,220,300,240];
  rootEl.innerHTML=`<div class="sk">${hs.map(h=>`<i style="height:${h}px"></i>`).join('')}</div>`;
}
function renderError(){
  rootEl.className='';
  rootEl.innerHTML=`<div class="state"><div class="big">📡</div><h3>לא הצלחנו לטעון את האלבום</h3>
    <p>בדקו את החיבור לאינטרנט ונסו שוב.</p><button class="btn sec" onclick="fetchGallery()">נסו שוב</button></div>`;
}
function renderEmpty(){
  rootEl.className='';
  rootEl.innerHTML=`<div class="state"><div class="big">🌻</div><h3>האלבום עוד ריק</h3>
    <p>היו הראשונים! לחצו על "הוסיפו תמונות" והעלו את הרגעים היפים שצילמתם בטיול.</p>
    <button class="btn" onclick="document.getElementById('fabUpload').click()">📸 הוסיפו את התמונה הראשונה</button></div>`;
}
function nPhotos(n){return n===1?'תמונה אחת':`${n} תמונות`}
/* flex-column masonry (replaces CSS multi-column, which flickers/vanishes on
   iOS Safari during scroll). Photos are packed into the currently-shortest
   column using their known aspect ratio, so columns stay balanced. */
let curCols=0;
function colCount(){return window.innerWidth>=900?3:2}
function masonryHtml(indices){
  const n=colCount();curCols=n;
  const cols=Array.from({length:n},()=>({h:0,html:''}));
  for(const gi of indices){
    const p=photos[gi];
    let m=0;for(let c=1;c<n;c++)if(cols[c].h<cols[m].h)m=c;
    cols[m].html+=figHtml(p,gi);
    cols[m].h+=(p.h/p.w)+0.12; /* image height (unit width) + caption/gap allowance */
  }
  const cls=`masonry style-${style}${selectMode?' selecting':''}`;
  return `<div class="${cls}">${cols.map(c=>`<div class="mcol">${c.html}</div>`).join('')}</div>`;
}
function gridHtml(indices){
  return `<div class="gridwrap style-grid${selectMode?' selecting':''}">${indices.map(gi=>figHtml(photos[gi],gi)).join('')}</div>`;
}
/* pick the layout for the active display style */
function layoutHtml(indices){return style==='grid'?gridHtml(indices):masonryHtml(indices)}
function render(){
  $('cntAll').textContent=photos.length||'';
  const ppl=new Set(photos.map(p=>p.uploader));
  $('cntPeople').textContent=ppl.size||'';
  const nNew=photos.filter(p=>p.isNew).length;
  const badge=$('newBadge');
  if(nNew>0){badge.textContent=`✨ ${nNew===1?'תמונה חדשה אחת':nNew+' תמונות חדשות'} מאז הביקור האחרון`;badge.classList.add('show')}
  else badge.classList.remove('show');
  renderContrib();rootEl.className='';
  if(!photos.length){renderEmpty();updateSelUI();return}
  if(view==='all'){
    const idx=photos.map((p,i)=>i);
    if(nNew>0&&nNew<photos.length){
      rootEl.innerHTML=layoutHtml(idx.slice(0,nNew))+
        `<div class="unread-divider"><b>✨ עד כאן חדש מאז הביקור האחרון</b></div>`+
        layoutHtml(idx.slice(nNew));
    }else rootEl.innerHTML=layoutHtml(idx);
  }else renderPeople();
  observeTiles();updateSelUI();
}
function renderContrib(){
  const el=$('contrib');
  if(!photos.length){el.innerHTML='';return}
  const seen=[];for(const p of photos)if(!seen.find(s=>s.name===p.uploader))seen.push({name:p.uploader,avatar:p.avatar});
  const shown=seen.slice(0,5);
  el.innerHTML=shown.map(s=>s.avatar
      ?`<img class="av av-img" style="background:${colorFor(s.name)}" src="${esc(s.avatar)}" data-ch="${esc(s.name[0])}" data-color="${colorFor(s.name)}" alt="" referrerpolicy="no-referrer">`
      :`<span class="av" style="background:${colorFor(s.name)}">${esc(s.name[0])}</span>`).join('')+
    `<span class="lbl">צילמו יחד<br><b>${shown.map(s=>esc(s.name)).join(' · ')}${seen.length>5?' ועוד':''}</b></span>`;
}
function renderPeople(){
  const groups=new Map();
  photos.forEach((p,gi)=>{
    if(!groups.has(p.uploader))groups.set(p.uploader,{avatar:p.avatar,items:[]});
    const g=groups.get(p.uploader);if(!g.avatar&&p.avatar)g.avatar=p.avatar;g.items.push(gi);
  });
  const sorted=[...groups.entries()].sort((a,b)=>b[1].items.length-a[1].items.length);
  rootEl.innerHTML=sorted.map(([name,g])=>`<section class="person">
    <div class="person-h">${avatarEl(g.avatar,name)}<h3>${esc(name)}</h3><span class="pc">${nPhotos(g.items.length)}</span></div>
    ${layoutHtml(g.items)}
  </section>`).join('');
}
function observeTiles(){
  const tiles=rootEl.querySelectorAll('.reveal');
  if(!('IntersectionObserver'in window)){tiles.forEach(t=>t.classList.add('in'));return}
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){
    const el=e.target;el.classList.add('in');io.unobserve(el);
    setTimeout(()=>{el.style.transitionDelay=''},650); /* drop stagger so hover is instant */
  }}),{rootMargin:'90px'});
  tiles.forEach((t,i)=>{t.style.transitionDelay=`${Math.min(i%12,8)*32}ms`;io.observe(t)});
}

/* view + style toggles */
document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{
  view=b.dataset.view;
  document.querySelectorAll('.seg button').forEach(x=>x.setAttribute('aria-selected',x===b?'true':'false'));
  render();
}));
document.querySelectorAll('.styleswitch button').forEach(b=>b.addEventListener('click',()=>{
  style=b.dataset.style;localStorage.setItem(LS_STYLE,style);
  document.querySelectorAll('.styleswitch button').forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false'));
  render();
}));

/* ================= selection ================= */
$('selectBtn').addEventListener('click',toggleSelectMode);
function toggleSelectMode(){
  selectMode=!selectMode;
  if(!selectMode)selected.clear();
  $('selectBtn').textContent=selectMode?'סיום':'בחירה';
  $('selectBtn').classList.toggle('pri',selectMode);
  render();
}
$('selCancel').addEventListener('click',toggleSelectMode);
$('selAll').addEventListener('click',()=>{
  const all=selected.size>=photos.length;
  selected.clear();if(!all)photos.forEach(p=>selected.add(p.id));
  document.querySelectorAll('figure[data-gi]').forEach(f=>f.classList.toggle('sel',selected.has(photos[+f.dataset.gi].id)));
  updateSelUI();
});
$('selDownload').addEventListener('click',saveSelected);
function updateSelUI(){
  $('selBar').classList.toggle('show',selectMode);
  $('selCount').textContent=selected.size;
  $('selDownload').disabled=selected.size===0;
  $('selAll').textContent=(selected.size>=photos.length&&photos.length)?'נקה בחירה':'בחר הכל';
}

/* ================= tile click (select or open) ================= */
rootEl.addEventListener('click',e=>{
  const f=e.target.closest('figure[data-gi]');if(!f)return;
  const gi=+f.dataset.gi;
  if(selectMode){
    const pid=photos[gi].id;
    if(selected.has(pid))selected.delete(pid);else selected.add(pid);
    f.classList.toggle('sel',selected.has(pid));updateSelUI();
  }else openLb(gi);
});
rootEl.addEventListener('keydown',e=>{if(e.key==='Enter'){const f=e.target.closest('figure[data-gi]');if(f){e.preventDefault();f.click()}}});

/* ================= lightbox ================= */
function openLb(i){
  if(i<0||i>=photos.length)return;
  lbIndex=i;const p=photos[i];
  $('lbImg').src=fullUrl(p);$('lbImg').alt=`תמונה מהטיול של ${p.uploader}`;
  $('lbWho').innerHTML=avatarEl(p.avatar,p.uploader)+`<span>${esc(p.uploader)}</span>`;
  $('lb').classList.add('open');document.body.style.overflow='hidden';$('lbClose').focus();
  if(SUPPORTS_FILE_SHARE)prefetchCurrent(p);
}
function closeLb(){$('lb').classList.remove('open');document.body.style.overflow='';lbIndex=-1}
function lbStep(d){if(lbIndex<0)return;const n=lbIndex+d;if(n>=0&&n<photos.length)openLb(n)}
$('lbClose').addEventListener('click',closeLb);
$('lbNext').addEventListener('click',()=>lbStep(1));
$('lbPrev').addEventListener('click',()=>lbStep(-1));
$('lbDownload').addEventListener('click',()=>{if(lbIndex>=0)saveOne(photos[lbIndex])});
$('lb').addEventListener('click',e=>{if(e.target===$('lb'))closeLb()});
document.addEventListener('keydown',e=>{
  if(!$('lb').classList.contains('open'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')lbStep(1);
  if(e.key==='ArrowRight')lbStep(-1);
});
let touchX=null;
$('lb').addEventListener('touchstart',e=>{touchX=e.touches[0].clientX},{passive:true});
$('lb').addEventListener('touchend',e=>{
  if(touchX===null)return;const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>50)lbStep(dx<0?1:-1);touchX=null;
},{passive:true});

/* ================= download / save ================= */
/* On phones (iOS/Android) we hand the actual image FILES to the native share
   sheet, so "שמירת תמונה" / "Save N Images" drops them straight into Apple
   Photos / the gallery. On desktop we fall back to a direct download / ZIP. */
const SUPPORTS_FILE_SHARE=(()=>{
  try{return !!(navigator.canShare&&navigator.share&&
    navigator.canShare({files:[new File(['x'],'a.jpg',{type:'image/jpeg'})]}))}
  catch(e){return false}
})();
const SHARE_TITLE='דרום צרפת 2026 🌻';
async function fetchFile(p,name){
  const r=await fetch(fullUrl(p));if(!r.ok)throw new Error('fetch');
  const blob=await r.blob();
  const ext=(blob.type.split('/')[1]||'jpg').replace('jpeg','jpg');
  return new File([blob],`${name}.${ext}`,{type:blob.type||'image/jpeg'});
}
function downloadOne(p){
  const a=document.createElement('a');a.href=origUrl(p);a.download='';a.rel='noopener';
  document.body.appendChild(a);a.click();a.remove();
  showToast('התמונה יורדת…');
}
/* prefetch the open photo so the share sheet can open on the very tap
   (iOS drops the user-gesture if we fetch after the click) */
let lbPrefetch={id:null,promise:null};
function prefetchCurrent(p){lbPrefetch={id:p.id,promise:fetchFile(p,'דרום צרפת 2026').catch(()=>null)}}
/* single photo: straight to the share sheet on mobile, download on desktop */
async function saveOne(p){
  if(SUPPORTS_FILE_SHARE){
    try{
      let f=(lbPrefetch.id===p.id&&lbPrefetch.promise)?await lbPrefetch.promise:null;
      if(!f)f=await fetchFile(p,'דרום צרפת 2026');
      if(f&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:SHARE_TITLE});return}
    }catch(e){if(e&&e.name==='AbortError')return}
  }
  downloadOne(p);
}
let jszipPromise=null;
function ensureJsZip(){
  if(window.JSZip)return Promise.resolve();
  if(jszipPromise)return jszipPromise;
  jszipPromise=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
  return jszipPromise;
}
function showProg(label){$('progLabel').textContent=label;$('progPct').textContent='0%';$('progFill').style.width='0%';$('prog').classList.add('show')}
function setProg(pct,label){$('progFill').style.width=pct+'%';$('progPct').textContent=Math.round(pct)+'%';if(label)$('progLabel').textContent=label}
function hideProg(){$('prog').classList.remove('show')}
/* multi: native share sheet on mobile (→ Save N Images to Photos), ZIP on desktop */
async function saveSelected(){
  const items=photos.filter(p=>selected.has(p.id));
  if(!items.length)return;
  if(items.length===1){await saveOne(items[0]);return}
  if(SUPPORTS_FILE_SHARE){
    try{
      showProg(`מכין ${items.length} תמונות…`);
      const files=[];
      for(let i=0;i<items.length;i++){setProg(i/items.length*100,`מכין ${i+1} מתוך ${items.length}…`);files.push(await fetchFile(items[i],`דרום צרפת ${i+1}`))}
      hideProg();
      if(navigator.canShare({files})){await navigator.share({files,title:SHARE_TITLE});return}
    }catch(e){hideProg();if(e&&e.name==='AbortError')return}
  }
  await zipDownload(items);
}
async function zipDownload(items){
  try{
    showProg(`אורז ${items.length} תמונות…`);
    await ensureJsZip();
    const zip=new JSZip(),used={};
    for(let i=0;i<items.length;i++){
      setProg((i/items.length)*70,`מוריד ${i+1} מתוך ${items.length}…`);
      const r=await fetch(fullUrl(items[i]));if(!r.ok)continue;
      const blob=await r.blob();
      let base=(items[i].uploader||'photo').replace(/[\\/:*?"<>|]/g,'');
      const ext=(blob.type.split('/')[1]||'jpg').replace('jpeg','jpg');
      let name=`${String(i+1).padStart(2,'0')}-${base}.${ext}`;
      if(used[name])name=`${String(i+1).padStart(2,'0')}-${base}-${i}.${ext}`;used[name]=1;
      zip.file(name,blob);
    }
    const content=await zip.generateAsync({type:'blob'},m=>setProg(70+m.percent*0.3,'יוצר קובץ ZIP…'));
    const url=URL.createObjectURL(content);
    const a=document.createElement('a');a.href=url;a.download='france2026-photos.zip';document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    hideProg();showToast('ה-ZIP ירד! 🎉');
  }catch(e){hideProg();showToast('ההורדה נכשלה — נסו שוב או הורידו תמונות בודדות')}
}

/* ================= toast ================= */
let toastTimer=null;
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3500)}

/* ================= init ================= */
document.querySelectorAll('.styleswitch button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.style===style?'true':'false'));
if(SUPPORTS_FILE_SHARE){ /* phones: frame it as saving to the gallery, not downloading */
  $('selDownload').innerHTML='⬇ שמירה לגלריה';
  $('lbDownload').innerHTML='⬇ שמירה';
}

let resizeTimer=null;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{if(photos.length&&style!=='grid'&&colCount()!==curCols)render()},200);
});
renderChip();
fetchGallery();
